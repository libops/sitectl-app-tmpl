name: goreleaser

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    uses: libops/.github/.github/workflows/sitectl-plugin-goreleaser.yaml@8f2eb98981e477cb8ac65d24c6fe06f45e31159c # main
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    with:
      go-version: "1.26.x"
      package-name: sitectl-app-tmpl
