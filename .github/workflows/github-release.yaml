name: Create release
on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  seed-initial-version:
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.title, 'skip-release')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout merged revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Seed the initial semantic-version baseline
        run: |
          set -euo pipefail
          if git tag --list | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            exit 0
          fi

          baseline="$(git rev-parse HEAD^)"
          git tag v0.0.0 "$baseline"
          git push origin refs/tags/v0.0.0

  release:
    needs: seed-initial-version
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.title, 'skip-release')
    uses: libops/actions/.github/workflows/bump-release.yaml@ef667db8c16533a257d841e75df5c3388152b2d7 # main
    with:
      workflow_file: goreleaser.yaml
      prefix: v
    permissions:
      contents: write
      actions: write
    secrets: inherit
