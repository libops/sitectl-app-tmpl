name: Create release
on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

concurrency:
  group: release
  queue: max
  cancel-in-progress: false

jobs:
  seed-initial-version:
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.title, 'skip-release')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Seed the initial semantic-version baseline
        run: |
          set -euo pipefail
          if git tag --list | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            exit 0
          fi

          if [[ ! "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "The pull request base is not a full commit SHA" >&2
            exit 1
          fi
          git merge-base --is-ancestor "$BASE_SHA" HEAD
          git tag v0.0.0 "$BASE_SHA"
          git push origin refs/tags/v0.0.0
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

  release:
    needs: seed-initial-version
    if: github.event.pull_request.merged == true && !contains(github.event.pull_request.title, 'skip-release')
    uses: libops/actions/.github/workflows/bump-release.yaml@ef667db8c16533a257d841e75df5c3388152b2d7 # main
    with:
      workflow_file: goreleaser.yaml
      prefix: v
    permissions:
      contents: write
      actions: write
    secrets: inherit
